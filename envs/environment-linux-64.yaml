name: greenbubble-pypsa107
channels:
  - gurobi
  - conda-forge
dependencies:
  - python=3.11
  - numpy>=1.26,<2
  - pandas>=2.1,<3
  - xarray>=2024.03,<2025
  - scipy
  - networkx
  - pypsa=1.0.7
  - reverse_geocoder
  - timezonefinder

  - linopy=0.5.6
  - highspy>=1.11
  - glpk
  - gurobi

  # NetCDF/HDF stack
  - netcdf4>=1.6
  - cftime>=1.6
  - h5py>=3.15
  - hdf5
  - libnetcdf

  # GIS stack (atlite dependencies)
  - atlite>=0.4
  - geopandas>=1.1
  - rasterio>=1.4
  - shapely>=2.1
  - pyproj>=3.7
  - cartopy>=0.25
  - proj-data
  - rtree

  # performance / misc
  - numexpr
  - bottleneck
  - dask>=2025.10
  - matplotlib>=3.10
  - seaborn>=0.13

  # notebooks + utilities
  - ipython
  - jupyterlab
  - ipykernel
  - openpyxl
  - requests
  - tqdm
  - coolprop

  - pip
  - pip:
      - entsoe-py
      - pypsatopo
