name: greenbubble-pypsa1
channels:
  - gurobi          # Gurobi’s official channel
  - conda-forge

dependencies:
  # Core
  - python=3.11
  - linopy>=0.3
  - pandas=2.*
  - xarray
  - numpy
  - scipy
  - networkx
  - coolprop

  # Solvers
  - highspy
  - glpk
  - gurobi          # includes the Python bindings "gurobipy"

  # Geo / atlite (keep if you use atlite/cartopy)
  - atlite
  - geopandas
  - rasterio
  - shapely>=2
  - pyproj
  - cartopy
  - netcdf4
  - h5py
  - proj-data
  - rtree
  - dask
  - bottleneck

  # Viz / notebooks / utils
  - matplotlib
  - seaborn
  - ipython
  - jupyterlab
  - ipykernel
  - openpyxl
  - requests
  - tqdm

  - pip
  - pip:
      - pypsa>=1,<2      # PyPSA 1.x via pip on ARM
      - entsoe-py
      - pypsatopo
