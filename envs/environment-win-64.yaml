name: greenbubble-pypsa107
channels:
  - gurobi
  - conda-forge
dependencies:
  - python=3.11

  # core scientific stack
  - pypsa=1.0.7
  - numpy>=1.26,<2
  - pandas>=2.1,<3
  - xarray>=2024.03,<2025
  - scipy
  - networkx
  - reverse_geocoder
  - timezonefinder

  # optimization
  - linopy=0.5.6
  - highspy>=1.11
  - glpk
  - gurobi

  # NetCDF / HDF stack (ABI-sensitive)
  - netcdf4>=1.6
  - cftime>=1.6
  - h5py>=3.15
  - hdf5
  - libnetcdf

  # GIS stack (atlite dependencies)
  - atlite>=0.4
  - geopandas
  - rasterio
  - shapely
  - pyproj
  - cartopy
  - proj-data
  - rtree

  # performance / plotting
  - numexpr
  - bottleneck
  - dask
  - matplotlib>=3.10
  - seaborn>=0.13
  - graphviz

  # notebooks + utilities
  - ipython
  - jupyterlab
  - ipykernel
  - openpyxl
  - requests
  - tqdm
  - coolprop

  - pip
  - pip:
      - entsoe-py
      - pypsatopo
