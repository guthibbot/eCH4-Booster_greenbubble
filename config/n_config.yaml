# n_config.yaml
# GREEN and BROWN field optimization
# for each technology set the initial capacity (with zero cost) and possibility to expand and the other constraints.

# common defaults for most technologies
base: &base
  initial capacity: 0 # default initial capacity null
  expansion: true # default capacity expansion
  cost factor: 1  # default to input source
  max capacity: .inf   # default to infinity

# -------------------  config (alphabetical) -------------------
# Units refer to bus0 in the network except for 'biogas'
# applies to all components of this each class (e.g. to all "H2 compressor" in the network)
battery: # includes inverter
  <<: *base
  ramp limit up: 0.5 # % of total en capacity per hour
  ramp limit down: 0.5 # % of total en capacity per hour
  expansion : true

biogas: # (unit: MW CH4,  for simplicity)
  <<: *base
  initial capacity: 0 #

biogas storage:
  <<: *base
  max capacity: 200 # MWh

biogas upgrading: # (unit: MW CH4,  for simplicity)
  <<: *base
  initial capacity: 0

biomass belt dryer:
  <<: *base
  cost factor: 1.2       # override
  min load: 0.5 # % of max power capacity that must run (otherwise shut-off)

biomass boiler:
  <<: *base

biomethanation biogas: # (bus0 unit: MW H2)
  <<: *base
  ramp limit up: 1 # % of total power capacity per hour
  ramp limit down: 1 # % of total power capacity per hour
  min load: 0.2 # % of max power capacity that must run (otherwise shut-off)
  expansion : true

biomethanation CO2: # (bus0 unit: MW H2)
  <<: *base
  ramp limit up: 1 # % of total power capacity per hour
  ramp limit down: 1 # % of total power capacity per hour
  min load: 0.2 # % of max power capacity that must run (otherwise shut-off)
  expansion : true

cat methanation biogas: # (bus0 unit: MW H2)
  <<: *base
  ramp limit up: 0.08 # % of total power capacity per hour
  ramp limit down: 0.08 # % of total power capacity per hour
  min load: 0.15 # % of max power capacity that must run (otherwise shut-off)
  expansion : true

cat methanation CO2: # (bus0 unit: MW H2)
  <<: *base
  ramp limit up: 0.08 # % of total power capacity per hour
  ramp limit down: 0.08 # % of total power capacity per hour
  min load: 0.15 # % of max power capacity that must run (otherwise shut-off)
  expansion: true

biogas compressor: # applies methanation
  <<: *base
  #expansion: true # valid for both centralized and plant-specific
  #capacity: 0 # valid only for centralized

CH4 compressor: # applies to both meoh and methanation
  <<: *base
  #expansion: true # valid for both centralized and plant-specific
  #capacity: 0 # valid only for centralized

CO2 compressor: # applies to both meoh and methanation
  <<: *base
  #expansion: true # valid for both centralized and plant-specific
  #capacity: 0 # valid only for centralized

CO2 HP storage:
  <<: *base
  expansion: true # valid for both centralized and plant-specific
  capacity : 0 # valid only for centralized

CO2 Liq storage: # NOTE: for expansion e_nom in store and p_nom in liquefaction are optimized separately. Initial capacity has a constant ratio (c-rate = 1)
  <<: *base
  expansion: true

CO2 pipe:
  <<: *base

dewatering:
  <<: *base

El boiler:
  <<: *base

electrolysis: # (bus0 unit: MW el )
  <<: *base
  cost factor: 2.5      # according to IEA (last pypsa-eur inputs)
  ramp limit up: 0.9 # % of total power capacity per hour
  ramp limit down: 0.9 # % of total power capacity per hour
  min load: 0.15 # % of max power capacity that must run (otherwise shut-off)

DH heat exchanger:
  <<: *base

eSMR meoh: # TODO add to the model
  <<: *base
  ramp limit up: 0.08 # % of total power capacity per hour
  ramp limit down: 0.08 # % of total power capacity per hour
  min load: 0.15 # % of max power capacity that must run (otherwise shut-off)

grid connection:
  <<: *base

H2 compressor:
  <<: *base
  cost factor: 2                        # override
  capacity : 0 # valid only for centralized
  #expansion: true # valid for both centralized and plant-specific
  #capacity: 0 # valid only for centralized

H2 pipe:
  <<: *base

H2 HP storage:
  <<: *base
  expansion: true # valid for both centralized and plant-specific
  # capacity: 0 # valid only for centralized

heat pump:
  <<: *base

methanolisation: # (bus0 unit: t/h CO2)
  <<: *base
  ramp limit up: 0.08 # % of total power capacity per hour
  ramp limit down: 0.08 # % of total power capacity per hour
  min load: 0.15 # % of max power capacity that must run (otherwise shut-off)

NG boiler:
  <<: *base

onwind:
  <<: *base

pelletization:
  <<: *base

pyrolysis:
  <<: *base

solar:
  <<: *base

TES concrete: # NOT working in stochastic
  <<: *base
  min capacity: 1.5 # MWh
  ramp limit up: 0.1 # % of total en capacity per hour
  ramp limit down: 0.1 # % of total en capacity per hour
  standing loss: 0.02 # % of total energy  per hour
  expansion: true

TES DH:
  <<: *base
  min capacity: 5 # MWh
  ramp limit up: 0.02 # % of total en capacity per hour
  ramp limit down: 0.02 # % of total en capacity per hour
  standing loss: 0.002 # % of total energy  per hour
  expansion: false
